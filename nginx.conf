server {
    listen 3075;
    server_name feedback.admin.local _;

    root /var/www/html;
    index index.php;

    # -------------------------------------------------------
    # Serve robots.txt as static file — no PHP involved
    # -------------------------------------------------------
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # -------------------------------------------------------
    # Route semua request ke index.php (front controller)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------
    # PHP-FPM handler
    # -------------------------------------------------------
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # -------------------------------------------------------
    # Blokir akses ke file tersembunyi
    # -------------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
